wearable:
  enabled: true
  device_id: "PERFORMER"
  publish_rate_hz: 20.0
  console: true

  imu_sink:
    enabled: true
    endpoint: "tcp://192.168.8.104:5572"
    bind: false
    topic: "sensors"
    sndhwm: 32
    linger_ms: 0

  button_pin: 17

  bno085:
    # Leave null for the Pi hardware I2C bus. Set to a bus number, e.g. 8,
    # when using the i2c-gpio software I2C overlay.
    i2c_bus: null
    fast_interval_ms: 10
    slow_interval_ms: 200
    motion_gyro_thresh: 0.05
    motion_linacc_thresh: 0.08
    motion_hold_frames: 10
